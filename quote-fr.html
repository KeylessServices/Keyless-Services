<!DOCTYPE html>
<html lang="fr">
<head>
    <load src="src/modules/fr/head-quote.html" />
</head>
<body>
    <load src="src/modules/background.html" />
    <load src="src/modules/fr/switcher-fr.html" />
    
    <main class="content-wrapper">
        <div class="glass-card quote-card">
            <h1 class="gradient-text" style="font-size: 2.5rem; margin-bottom: 24px;">Demander une soumission</h1>
            <p>Remplissez les détails ci-dessous et nous vous répondrons avec une soumission le plus tôt possible.</p>
            
            <form id="quote-form" action="https://formspree.io/f/mlgoyepw" method="POST" class="quote-form">
                <!-- Formspree configurations -->
                <input type="hidden" name="_subject" value="Demande de soumission - Keyless Services">
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="name">Nom complet</label>
                        <input type="text" id="name" name="name" required placeholder="Jean Tremblay">
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Adresse courriel</label>
                        <input type="email" id="email" name="email" required placeholder="jean@exemple.com">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="make">Marque du véhicule</label>
                        <input type="text" id="make" name="make" required placeholder="ex: Ford, Toyota">
                    </div>
                    
                    <div class="form-group">
                        <label for="model">Modèle du véhicule</label>
                        <input type="text" id="model" name="model" required placeholder="ex: F-150, Camry">
                    </div>
                    
                    <div class="form-group">
                        <label for="year">Année du véhicule</label>
                        <input type="number" id="year" name="year" min="1950" max="2025" required placeholder="ex: 2018">
                    </div>
                </div>

                <div class="form-group full-width">
                    <label for="comments">Détails supplémentaires / Commentaires</label>
                    <textarea id="comments" name="comments" rows="4" placeholder="Veuillez décrire le service dont vous avez besoin (ex: Toutes les clés sont perdues, besoin d'un double, télécommande brisée)"></textarea>
                </div>

                <button type="submit" id="submit-button" class="btn-glow form-submit">Envoyer la demande</button>
            </form>

            <div id="success-message" class="success-message" style="display: none;">
                <div class="success-icon lock-success">
                    <svg width="64" height="64" viewBox="0 -6 24 30" fill="none" stroke="var(--primary-glow)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2" class="lock-body"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4" class="lock-shackle"></path>
                    </svg>
                </div>
                <h2 class="gradient-text">Succès !</h2>
                <p>Nous vous répondrons sous peu.</p>
                <div class="redirect-loader"></div>
            </div>
        </div>

        <div class="cta-section" style="margin-top: 0;">
            <div class="social-links">
                <a href="fr.html">Retour à l'accueil</a>
            </div>
        </div>
    </main>

    <load src="src/modules/scripts.html" />
    <script>
        const form = document.getElementById('quote-form');
        const successMessage = document.getElementById('success-message');
        const submitButton = document.getElementById('submit-button');

        if (form) {
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                submitButton.disabled = true;
                submitButton.innerText = 'Envoi en cours...';

                const formData = new FormData(form);
                
                try {
                    const response = await fetch(form.action, {
                        method: 'POST',
                        body: formData,
                        headers: {
                            'Accept': 'application/json'
                        }
                    });

                    if (response.ok) {
                        form.style.display = 'none';
                        successMessage.style.display = 'block';
                        
                        setTimeout(() => {
                            window.location.href = 'fr.html';
                        }, 3000);
                    } else {
                        const data = await response.json();
                        alert(data.errors ? data.errors.map(error => error.message).join(", ") : "Oups ! Il y a eu un problème lors de l'envoi de votre formulaire");
                        submitButton.disabled = false;
                        submitButton.innerText = 'Envoyer la demande';
                    }
                } catch (error) {
                    alert("Oups ! Il y a eu un problème lors de l'envoi de votre formulaire");
                    submitButton.disabled = false;
                    submitButton.innerText = 'Envoyer la demande';
                }
            });
        }
    </script>
</body>
</html>
