<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get a Quote | Keyless Services Whitehorse</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" sizes="any">
    <link rel="shortcut icon" href="/favicon.svg?v=2">
    <link rel="apple-touch-icon" href="/favicon.svg?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="background-container">
        <canvas id="particles-canvas"></canvas>
    </div>
    
    <main class="content-wrapper">
        <div class="glass-card quote-card">
            <h1 class="gradient-text" style="font-size: 2.5rem; margin-bottom: 24px;">Request a Quote</h1>
            <p>Fill out the details below and we will get back to you with a quote as soon as possible.</p>
            
            <form id="quote-form" action="https://formspree.io/f/mlgoyepw" method="POST" class="quote-form">
                <!-- Formspree configurations -->
                <input type="hidden" name="_subject" value="New Quote Request - Keyless Services">
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" required placeholder="John Doe">
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required placeholder="john@example.com">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="make">Vehicle Make</label>
                        <input type="text" id="make" name="make" required placeholder="e.g. Ford, Toyota">
                    </div>
                    
                    <div class="form-group">
                        <label for="model">Vehicle Model</label>
                        <input type="text" id="model" name="model" required placeholder="e.g. F-150, Camry">
                    </div>
                    
                    <div class="form-group">
                        <label for="year">Vehicle Year</label>
                        <input type="number" id="year" name="year" min="1950" max="2025" required placeholder="e.g. 2018">
                    </div>
                </div>

                <div class="form-group full-width">
                    <label for="comments">Additional Details / Comments</label>
                    <textarea id="comments" name="comments" rows="4" placeholder="Please describe the service you need (e.g. Lost all keys, need a spare, broken fob)"></textarea>
                </div>

                <button type="submit" id="submit-button" class="btn-glow form-submit">Submit Request</button>
            </form>

            <div id="success-message" class="success-message" style="display: none;">
                <div class="success-icon lock-success">
                    <svg width="64" height="64" viewBox="0 -6 24 30" fill="none" stroke="var(--primary-glow)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2" class="lock-body"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4" class="lock-shackle"></path>
                    </svg>
                </div>
                <h2 class="gradient-text">Success!</h2>
                <p>We will get back to you shortly.</p>
                <div class="redirect-loader"></div>
            </div>
        </div>

        <div class="cta-section" style="margin-top: 0;">
            <div class="social-links">
                <a href="/">Back to Home</a>
            </div>
        </div>
    </main>

    <script type="module" src="./main.js"></script>
    <script>
        const form = document.getElementById('quote-form');
        const successMessage = document.getElementById('success-message');
        const submitButton = document.getElementById('submit-button');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Disable button loading state
            submitButton.disabled = true;
            submitButton.innerText = 'Sending...';

            const formData = new FormData(form);
            
            try {
                const response = await fetch(form.action, {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                if (response.ok) {
                    form.style.display = 'none';
                    successMessage.style.display = 'block';
                    
                    // Redirect back home after 3 seconds
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 3000);
                } else {
                    const data = await response.json();
                    alert(data.errors ? data.errors.map(error => error.message).join(", ") : "Oops! There was a problem submitting your form");
                    submitButton.disabled = false;
                    submitButton.innerText = 'Submit Request';
                }
            } catch (error) {
                alert("Oops! There was a problem submitting your form");
                submitButton.disabled = false;
                submitButton.innerText = 'Submit Request';
            }
        });
    </script>
</body>
</html>
